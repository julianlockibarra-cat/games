<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">

	<title>Flappy Bird Game</title>

	<style>
	body {
		background-color: black;
		margin: 0;
		font-family: sans-serif;
	}
	canvas {
		display: block;
		position: absolute;
		margin: auto;
		top: 0;
		bottom: 0;
		left: 0;
		right: 0;
	}
	.neon-text {
		position: absolute;
		top: 12%;
		left: 50%;
		transform: translateX(-50%);
		margin: 0;
		z-index: 10;
		color: #fff;
		font-family: "Arial Black", sans-serif;
		font-size: 2.5rem;
		text-transform: uppercase;
		text-align: center;
		white-space: nowrap;
		text-shadow:
			0 0 5px #fff,
			0 0 10px #fff,
			0 0 20px #0ff,
			0 0 40px #0ff,
			0 0 80px #0ff,
			0 0 90px #0ff,
			0 0 100px #0ff;
		pointer-events: none;
	}
	/* Settings Bar Styles */
	.settings-bar {
		position: absolute;
		bottom: 5%;
		left: 50%;
		transform: translateX(-50%);
		z-index: 10;
		background: rgba(30, 30, 30, 0.8);
		padding: 10px 20px;
		border-radius: 8px;
		border: 1px solid #444;
		color: white;
		display: flex;
		align-items: center;
		gap: 15px;
		font-weight: bold;
	}
	.settings-bar input[type=range] {
		cursor: pointer;
	}
	</style>
</head>
<body>

<h1 class="neon-text">Flappy Bird</h1>

<div class="settings-bar">
	<label for="speedSlider">Speed: <span id="speedValue">2</span>x</label>
	<input type="range" id="speedSlider" min="1" max="5" step="0.5" value="2">
</div>

<script>
// ==========================================
// 1. SPRITE MANAGER
// ==========================================
var 
s_bird,
s_bg,
s_fg,
s_pipeNorth,
s_pipeSouth,
s_text,
s_score,
s_splash,
s_buttons,
s_numberS,
s_numberB;

// Global Game Speed Variable
var gameSpeed = 2;

// Listen for slider changes
document.getElementById('speedSlider').addEventListener('input', function(e) {
	gameSpeed = parseFloat(e.target.value);
	document.getElementById('speedValue').innerText = gameSpeed;
});

function Sprite(img, x, y, width, height) {
	this.img = img;
	this.x = x*2;
	this.y = y*2;
	this.width = width*2;
	this.height = height*2;
};
Sprite.prototype.draw = function(ctx, x, y) {
	ctx.drawImage(this.img, this.x, this.y, this.width, this.height,
		x, y, this.width, this.height);
};

function initSprites(img) {
	s_bird = [
		new Sprite(img, 156, 115, 17, 12),
		new Sprite(img, 156, 128, 17, 12),
		new Sprite(img, 156, 141, 17, 12)
	];
	
	s_bg = new Sprite(img,   0, 0, 138, 114);
	s_bg.color = "#70C5CF";
	s_fg = new Sprite(img, 138, 0, 112,  56);
	
	s_pipeNorth = new Sprite(img, 251, 0, 26, 200);
	s_pipeSouth = new Sprite(img, 277, 0, 26, 200);
	
	s_text = {
		FlappyBird: new Sprite(img, 59, 114, 96, 22),
		GameOver:   new Sprite(img, 59, 136, 94, 19),
		GetReady:   new Sprite(img, 59, 155, 87, 22)
	}
	s_buttons = {
		Rate:  new Sprite(img,  79, 177, 40, 14),
		Menu:  new Sprite(img, 119, 177, 40, 14),
		Share: new Sprite(img, 159, 177, 40, 14),
		Score: new Sprite(img,  79, 191, 40, 14),
		Ok:    new Sprite(img, 119, 191, 40, 14),
		Start: new Sprite(img, 159, 191, 40, 14)
	}

	s_score  = new Sprite(img, 138,  56, 113, 58);
	s_splash = new Sprite(img,   0, 114,  59, 49);

	s_numberS = new Sprite(img, 0, 177, 6,  7);
	s_numberB = new Sprite(img, 0, 188, 7, 10);

	s_numberS.draw = s_numberB.draw = function(ctx, x, y, num, center, padding) {
		num = num.toString();
		var step = this.width + 2;
		if(center){
			x=center-(num.length*step -2)/2;
		}
		if(padding){
			x+=step*(padding-num.length);
		}
		for (var i = 0, len = num.length; i < len; i++) {
			var n = parseInt(num[i]);
			ctx.drawImage(this.img, step*n, this.y, this.width, this.height,
				x, y, this.width, this.height)
			x += step;
		}
	}
}

// ==========================================
// 2. MAIN GAME ENGINE
// ==========================================
var 
canvas,
ctx,
width,
height,

fgpos=0,
frames=0,
score=0,
best=0,

currentstate,
states={
   Splash:0, Game:1, Score:2
},

bird={
     x:60,
	 y:100,
	 frame:0,
	 velocity:0,
	 animation:[0,1,2,1],
	 rotation:0,
	 gravity:0.25,
	 _jump:4.6,
	 radius: 12,
	 
	 jump:function(){
	    this.velocity=-this._jump;
	 },
	 
	 update:function(){
	  var n=(currentstate===states.Splash)?10:5;
	  this.frame += (frames%n)===0 ? 1:0;
	  
      this.frame= this.frame %this.animation.length;
      
	  if(currentstate===states.Splash){
	  this.y=height-280+5*Math.cos(frames/10);
	  this.rotation=0;
	  }
	  else {
	  this.velocity+=this.gravity;
	  this.y+=this.velocity;
	  
	  if(this.y >= height-s_fg.height-10){
	     this.y=height-s_fg.height-10;
		 if(currentstate===states.Game)
		      currentstate=states.Score;
		 this.velocity=this._jump;
	  }     
         
      if(this.velocity>=this._jump){
		 this.frame=1;
		 this.rotation=Math.min(Math.PI/6,this.rotation+0.3);
	  }else{
		 this.rotation=-0.3;
	  }         
	  }
	 },
	 
	 draw:function(ctx){
	 ctx.save();
	 ctx.translate(this.x,this.y);
	 ctx.rotate(this.rotation);
	 var n=this.animation[this.frame];
	 s_bird[n].draw(ctx, -s_bird[n].width/2 , -s_bird[n].height/2);
	 ctx.restore();
	 }
},

pipes={
       _pipes:[],
	   distanceCounter: 200, // Initialize to start spawning immediately
	   
	   reset:function(){
	      this._pipes=[];
		  this.distanceCounter = 200; 
	   },
       update:function(){
		 
		 // Track horizontal distance covered
		 this.distanceCounter += gameSpeed;
		 
		 // Base horizontal distance between pipes
		 var targetHorizontalGap = 200;
		 
		 // INCREASE the horizontal distance when speed goes to 3x and above
		 if (gameSpeed >= 3) {
			 // Spreads them further apart. For 3x it adds 50px gap, 4x adds 100px, etc.
			 targetHorizontalGap = 200 + ((gameSpeed - 2) * 50);
		 }
		 
		 // Ensure they don't get impossible to pass (Minimum 120 pixels apart just in case)
		 targetHorizontalGap = Math.max(120, targetHorizontalGap);

	     if(this.distanceCounter >= targetHorizontalGap){
		  
		  this.distanceCounter = 0; // Reset counter for the next pipe
		  
		  var gapHeight = 95; // Kept the vertical gap strictly normal
		  var min_y = 40;
		  var max_y = height - s_fg.height - gapHeight - 40;
		  var _y = min_y + Math.random() * (max_y - min_y);
		  
		  this._pipes.push({
             x: width,
             y: _y, 
             width: s_pipeSouth.width,
             height: s_pipeSouth.height,
             gap: gapHeight,
             scored: false
		  });
		  }
		  
		 for(var i=0,len=this._pipes.length;i<len;i++)
		 {
		 var p=this._pipes[i];
		  
         if(!p.scored && p.x + p.width/2 < bird.x){
             score++;
             p.scored = true;
         }
         
         // Strict Hit Detection 
         if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + p.width) {
             if (bird.y - bird.radius < p.y || bird.y + bird.radius > p.y + p.gap) {
                 currentstate = states.Score;
             }
         }
            
		 // Applies the slider game speed to the pipes
		 p.x -= gameSpeed;
		 
		 if(p.x < -p.width)
		 {
		 this._pipes.splice(i,1);
		 i--;
		 len--;
		 }
		 }
	   },
	   
	   draw:function(ctx){
	   for(var i=0,len=this._pipes.length;i<len;i++){
	   var p=this._pipes[i];
	   s_pipeSouth.draw(ctx, p.x, p.y - s_pipeSouth.height);
	   s_pipeNorth.draw(ctx, p.x, p.y + p.gap);
	   }
	   }
};

function onpress(evt){
	// Prevent slider clicks from making the bird jump
	if (evt.target.id === 'speedSlider') return;

	switch(currentstate){
	case states.Splash:
		 currentstate=states.Game;
		 bird.jump();
		 break;
	case states.Game:
		 bird.jump();
		 break;
	case states.Score:
		 var mx=evt.offsetX , my=evt.offsetY;
		 if(mx==null || my==null)
		 {mx=evt.touches[0].clientX;
		  my=evt.touches[0].clientY;
		 }
		 if(okbtn.x < mx && mx <okbtn.x+okbtn.width  &&
			okbtn.y < my && my <okbtn.y+okbtn.height )
			  {
			  pipes.reset();
			  score=0;
			  currentstate=states.Splash;
			  }
		 break;
	}
}

function main(){
     currentstate=states.Splash;
     canvas=document.createElement("canvas");
	 width=window.innerWidth;
	 height=window.innerHeight;
	 
	 var evt="touchstart";
	 if(width>=500)
	 {width=320;
	 height=480;
	 canvas.style.border="1px solid #020";
	 evt="mousedown";
	 }
	 
	 document.addEventListener(evt,onpress);

	 canvas.width=width;
	 canvas.height=height;
	 ctx=canvas.getContext("2d");
	 document.body.appendChild(canvas);
	
	 var img=new Image();
	 
	 img.onload=function(){
	 initSprites(this);
	 ctx.fillStyle=s_bg.color;
	 okbtn={
	     x:(width-s_buttons.Ok.width)/2,
		 y:height-200,
		 width:s_buttons.Ok.width,
		 height:s_buttons.Ok.height
	 }
	 run();
	 } 
	 
	 img.src="https://raw.githubusercontent.com/Priyadarshan2000/FLAPPY-BIRD-GAME/refs/heads/main/sheet.png";
}

function run()
{
     var loop=function(){
             update();
			render();
			window.requestAnimationFrame(loop,canvas);
        }
		window.requestAnimationFrame(loop,canvas);
}

function update(){
       frames++;
       if(currentstate!== states.Score){
		   // Applies the slider game speed to the scrolling floor
	       fgpos=(fgpos-gameSpeed)%14;
	   }
	   else
	   { best=Math.max(best,score);}
	   if(currentstate===states.Game)
	   {pipes.update();}
	   
       bird.update();
}

function render(){
	  ctx.fillStyle = s_bg.color || "#70C5CF";
	  ctx.fillRect(0,0,width,height);
	  
      s_bg.draw(ctx,0,height-s_bg.height);  
      s_bg.draw(ctx,s_bg.width,height-s_bg.height);  

      bird.draw(ctx);	  
	  pipes.draw(ctx);

	  s_fg.draw(ctx,fgpos,height-s_fg.height);
	  s_fg.draw(ctx,fgpos+s_fg.width,height-s_fg.height); 
      
	  var width2=width/2;
	  if(currentstate===states.Splash){
	  s_splash.draw(ctx,width2-s_splash.width/2,height-300);
	  s_text.GetReady.draw(ctx,width2-s_text.GetReady.width/2,height-400);
	  }
	  
	  if(currentstate===states.Score){
	  s_text.GameOver.draw(ctx,width2-s_text.GameOver.width/2,height-400);
	  s_score.draw(ctx,width2-s_score.width/2,height-340);
	  s_buttons.Ok.draw(ctx,okbtn.x,okbtn.y);
	  
	  s_numberS.draw(ctx,width2-47,height-304,score,null,10);
	  s_numberS.draw(ctx,width2-47,height-262,best,null,10);
	  }else{
	  s_numberB.draw(ctx,null ,20,score,width2,null);
	  }
}

main();
</script>
</body>
</html>
