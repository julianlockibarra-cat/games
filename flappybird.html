<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Flappy Bird</title>
    <style>
        /* Remove default margins and hide scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Black background while loading */
        }

        /* Force the iframe to take up the exact viewport dimensions */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://thorium.rocks/games/flappy-bird/" 
        allow="fullscreen">
    </iframe>

</body>
</html>
